services:
  frontend:
    image: ghcr.io/jeremyduc73/portfolio-frontend:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NUXT_API_SERVER_URL=http://backend:3333
      - NUXT_PUBLIC_API_URL=https://jeremyduc.dev
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/jeremyduc73/portfolio-backend:latest
    ports:
      - "127.0.0.1:3333:3333"
    environment:
      - HOST=0.0.0.0
      - PORT=3333
      - NODE_ENV=production
      - CORS_ORIGIN=https://jeremyduc.dev
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

volumes:
  backend-data:
