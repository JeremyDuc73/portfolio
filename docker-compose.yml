services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "11500:3000"
    environment:
      - NUXT_API_SERVER_URL=http://backend:3333
      - NUXT_PUBLIC_API_URL=http://localhost:11501
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "11501:3333"
    environment:
      - HOST=0.0.0.0
      - PORT=3333
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:11500
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend-data:/app/data
    command: npx tsx watch src/server.ts

volumes:
  backend-data:
